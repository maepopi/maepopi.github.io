{{ $src := .Get "src" }}
{{ $title := .Get "title" | default "Video" }}
{{ $maxWidth := .Get "maxwidth" | default "560px" }}
<div style="max-width: {{ $maxWidth }}; margin: 1rem auto;">
  <div class="video-container" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
    <iframe src="{{ $src }}" title="{{ $title }}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"></iframe>
  </div>
</div>
