{{ $names := split (.Get "names") "," }}
<div class="category-section mb5 cv-tabs-container research-tabs-container">
  <div class="category-separator cv-tab-buttons" role="tablist">
    {{ range $i, $name := $names }}
      {{ $id := printf "research-tab-%d" $i }}
      <button class="category-label cv-tab-btn {{ if eq $i 0 }}active{{ end }}" role="tab" data-tab="{{ $id }}" aria-selected="{{ if eq $i 0 }}true{{ else }}false{{ end }}">
        {{ trim $name " " }}
      </button>
    {{ end }}
  </div>
  <div class="cv-tab-panels">
    {{ .Inner }}
  </div>
</div>
<script>
(function() {
  const container = document.querySelector('.research-tabs-container');
  if (!container) return;
  const buttons = container.querySelectorAll('.cv-tab-btn');
  const panels = container.querySelectorAll('.cv-tab-panel');
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      panels.forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      const tabId = btn.getAttribute('data-tab');
      const panel = container.querySelector(`.cv-tab-panel[data-tab="${tabId}"]`);
      if (panel) panel.classList.add('active');
    });
  });
})();
</script>
